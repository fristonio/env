# tmux accepts utf8
setw -gq utf8 on
set-window-option -g mode-keys vi

# set window numbering to start from 1
set -g base-index 1

# set history line limit for tmux
set -g history-limit 30000

# Since newer versions the above all mouse configs have been converted into
# a single name mouse
set -g mouse on

# Renumber windows when window is closed.
set -g renumber-windows on

# Do not allow renaming of windows automatically
set-option -g allow-rename off

# Set title for terminal emulator to the path where session was started.
set-option -g set-titles on
# Print session path in the title relative to $HOME.
set-option -g set-titles-string "#{s|$HOME\/||:session_path}"

# remap tmux prefix
# Unbind the Ctrl+B and set the prefix to Ctrl+a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

unbind '"'
unbind %

# Reload tmux configuration
bind r source-file ~/.tmux.conf

# Pane splitting
# Use prefix+j to split window vertically and prefix+l to split horizontally
bind j split-window -v
bind l split-window -h

bind v split-window -v
bind h split-window -h

# Switching panes
# M represents the meta key which is the ALT key
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-j select-pane -D
bind -n M-k select-pane -U

# Cycling between windows using Ctrl+[0-9]
bind-key -n C-0 select-window -t :0
bind-key -n C-1 select-window -t :1
bind-key -n C-2 select-window -t :2
bind-key -n C-3 select-window -t :3
bind-key -n C-4 select-window -t :4
bind-key -n C-5 select-window -t :5
bind-key -n C-6 select-window -t :6
bind-key -n C-7 select-window -t :7
bind-key -n C-8 select-window -t :8
bind-key -n C-9 select-window -t :9

# Go to last window using C-a a
bind-key a last-window

bind-key -T prefix C-a last-window
bind-key -T prefix C-p previous-window
bind-key -T prefix C-n next-window

unbind-key C-y
bind-key -T prefix C-y choose-tree

bind-key -T prefix C-v copy-mode

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection

bind-key -T copy-mode-vi H send -X start-of-line
bind-key -T copy-mode-vi L send -X end-of-line
bind-key -T copy-mode-vi K send -X previous-prompt -o
bind-key -T copy-mode-vi J send -X next-prompt -o

# Alias to C-a C-c
bind-key -T prefix C-t new-window
# Alias to C-a C-x
bind-key -T prefix C-w unlink-window -k

# Make tmux quiet
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# Resize pane
bind-key -T prefix M-h resize-pane -L 25
bind-key -T prefix M-l resize-pane -R 25
bind-key -T prefix M-j resize-pane -U 25
bind-key -T prefix M-k resize-pane -D 25

## Optionally resize with shifted keys.
bind-key -T prefix H resize-pane -L 15
bind-key -T prefix L resize-pane -R 15
bind-key -T prefix J resize-pane -U 15
bind-key -T prefix K resize-pane -D 15

# Open command mode with C-a ;
bind-key -T prefix \; command-prompt

## Terminal Settings

# Force tmux to assume that the terminal supports 256 colors
# Fixes the color theme of vim for me
set -g default-terminal "xterm-256color"
# Add italic support for tmux
# This depends on the uderlying terminal to have italics support.
set -as terminal-overrides ',xterm*:sitm=\E[3m'
# Update terminal options to use True colors for tmux.
# Comment this if truecolor is not supported by the underlying terminal
set-option -sa terminal-overrides ",xterm*:Tc"

## Tmux Visuals

# catppuccin-frappe pallete
set -g @theme_bg            "#292c3c"
set -g @theme_fg            "#c6d0f5"
set -g @theme_accent        "#ef9f76" # Peach
set -g @theme_accent_subtle "#babbf1" # Lavender
set -g @theme_surface0      "#414559"
set -g @theme_surface1      "#51576d"
set -g @theme_pink          "#f4b8e4"
set -g @theme_green         "#a6d189"
set -g @theme_cyan          "#99d1db"
set -g @theme_blue          "#8caaee"

# everforest pallete
# set -g @theme_bg              "#2d353b" # bg0
# set -g @theme_fg              "#d3c6aa" # fg
# set -g @theme_accent          "#e69875" # Orange (Active index & borders)
# set -g @theme_accent_subtle   "#7fbbb3" # Blue (Inactive index)
# set -g @theme_surface0        "#343f44" # bg1
# set -g @theme_surface1        "#3d484d" # bg2
# set -g @theme_pink            "#d699b6" # Purple
# set -g @theme_green           "#a7c080" # Green
# set -g @theme_cyan            "#83c092" # Aqua
# set -g @theme_blue            "#7fbbb3" # Blue

set -g status-interval 5
set -g status-justify absolute-centre

set -F -g pane-border-style "fg=#{@theme_surface1}"
set -F -g pane-active-border-style "fg=#{@theme_accent_subtle}"

# Style for highlighted text in copy-mode and item selection menus
set -F -g mode-style "bg=#{@theme_surface1},fg=#{@theme_fg},bold"
set -F -g message-style "bg=#{@theme_surface0},fg=#{@theme_accent},bold"

# Style used when searching or navigating command history
set -F -g message-command-style "bg=#{@theme_surface0},fg=#{@theme_blue},bold"

set -F -g status-style "bg=#{@theme_bg},fg=#{@theme_fg}"

set -g status-left-length 64
set -g status-left \
"#[fg=#{@theme_accent},bg=#{@theme_bg}]\
#[fg=#{@theme_bg},bg=#{@theme_accent}] \
#[fg=#{@theme_accent},bg=#{@theme_surface1}]\
#[fg=#{@theme_fg},bg=#{@theme_surface1},bold] #S | #{s|$HOME\/||:session_path}\
#[fg=#{@theme_surface1},bg=#{@theme_bg}]"

set -g status-right-length 64
set -g status-right \
"#[fg=#{@theme_blue},bg=#{@theme_bg}]\
#[fg=#{@theme_bg},bg=#{@theme_blue}]󰃭 \
#[fg=#{@theme_blue},bg=#{@theme_surface1}]\
#[fg=#{@theme_fg},bg=#{@theme_surface1},bold] %Y-%m-%d %H:%M\
#[fg=#{@theme_surface1},bg=#{@theme_bg}]"

set -g window-status-separator " "
# Active Window
set -g window-status-current-format "\
#[fg=#{@theme_green},bg=#{@theme_bg}]\
#[fg=#{@theme_bg},bg=#{@theme_green},bold]#I\
#[fg=#{@theme_green},bg=#{@theme_surface1}]\
#[fg=#{@theme_fg},bg=#{@theme_surface1}]#{?window_zoomed_flag, 󰍉,} #W #[fg=#{@theme_cyan}]\
#[fg=#{@theme_surface1},bg=#{@theme_bg}]"

# Inactive Window
set -g window-status-format '\
#[fg=#{@theme_accent_subtle},bg=#{@theme_bg}]\
#[fg=#{@theme_bg},bg=#{@theme_accent_subtle},bold]#I\
#[fg=#{@theme_accent_subtle},bg=#{@theme_surface0}]\
#[fg=#{@theme_accent_subtle},bg=#{@theme_surface0}]#{?window_zoomed_flag, 󰍉,} \
#{s|([^/])[^/]*/|\1/|:#{s|#{l:#{HOME}}|~|:pane_current_path}} \
#[fg=#{@theme_accent}]#{?window_last_flag,,}\
#[fg=#{@theme_surface0},bg=#{@theme_bg}]'
